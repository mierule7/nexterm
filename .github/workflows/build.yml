name: Build NexTerm
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
jobs:
 
  # ─── Build for Windows ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Build Windows installer
        run: npx electron-builder --win --publish never
 
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexTerm-Windows
          path: dist/*.exe
          retention-days: 30
 
  # ─── Build for Linux ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage --publish never
 
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexTerm-Linux
          path: dist/*.AppImage
          retention-days: 30
 
  # ─── Build for macOS ────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
 
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexTerm-macOS
          path: dist/*.dmg
          retention-days: 30