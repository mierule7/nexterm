<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" />
  <title>NexTerm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/xterm.css" />
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="titlebar">
      <div class="titlebar-drag">
        <div class="app-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="3" width="20" height="14" rx="2" stroke="#00d4aa" stroke-width="1.5"/>
            <path d="M7 8l3 3-3 3M13 14h4" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M8 21h8M12 17v4" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>NexTerm</span>
        </div>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg width="11" height="11" viewBox="0 0 11 11"><rect x="0" y="5" width="11" height="1.5" fill="currentColor" rx="1"/></svg>
        </button>
        <button id="btn-maximize" title="Maximize">
          <svg width="11" height="11" viewBox="0 0 11 11"><rect x="1" y="1" width="9" height="9" stroke="currentColor" stroke-width="1.5" fill="none" rx="1"/></svg>
        </button>
        <button id="btn-close" class="close" title="Close">
          <svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 1l9 9M10 1l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Layout -->
    <div id="layout">
      <!-- Sidebar -->
      <div id="sidebar">
        <div class="sidebar-nav">
          <button class="nav-btn active" data-panel="sessions" title="Sessions">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="8" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="3" width="8" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 19h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button class="nav-btn" data-panel="tunnels" title="Tunnels">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 12C3 7 7 4 12 4s9 3 9 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12c0 5 4 8 9 8s9-3 9-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
          </button>
          <button class="nav-btn" data-panel="keyvault" title="Key Vault">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 118 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>

        <div class="sidebar-panel active" id="panel-sessions">
          <div class="panel-header">
            <span>Sessions</span>
            <button class="icon-btn" id="btn-new-session" title="New Session">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input type="text" id="session-search" placeholder="Search sessions..." />
          </div>
          <div id="session-tree"></div>
        </div>

        <div class="sidebar-panel" id="panel-tunnels">
          <div class="panel-header">
            <span>SSH Tunnels</span>
            <button class="icon-btn" id="btn-new-tunnel" title="New Tunnel">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="tunnel-list"></div>
        </div>

        <div class="sidebar-panel" id="panel-keyvault">
          <div class="panel-header">
            <span>Key Vault</span>
            <button class="icon-btn" id="btn-add-key" title="Add Key">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="key-list"></div>
        </div>
      </div>

      <!-- Main Content -->
      <div id="main-content">
        <!-- Tab Bar -->
        <div id="tabbar">
          <div id="tabs-container"></div>
          <button class="icon-btn" id="btn-add-tab" title="New Tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <!-- Panes -->
        <div id="panes-container">
          <div id="welcome-screen">
            <div class="welcome-content">
              <div class="welcome-logo">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                  <rect x="2" y="3" width="20" height="14" rx="2" stroke="#00d4aa" stroke-width="1.5"/>
                  <path d="M7 8l3 3-3 3M13 14h4" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M8 21h8M12 17v4" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h1>NexTerm</h1>
              <p>Professional SSH & Remote Desktop Client</p>
              <div class="quick-actions">
                <button class="quick-btn" id="qb-new-session">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  New SSH Session
                </button>
                <button class="quick-btn" id="qb-new-sftp">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 15v4h18v-4M12 3v12m-4-4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  SFTP Browser
                </button>
                <button class="quick-btn" id="qb-new-tunnel">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 12C3 7 7 4 12 4s9 3 9 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12c0 5 4 9 9 9s9-4 9-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  SSH Tunnel
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-container"></div>
  </div>

  <!-- Notification -->
  <div id="notification-container"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/addon-fit.min.js"></script>
  <script src="components/sessions.js"></script>
  <script src="components/terminal.js"></script>
  <script src="components/sftp.js"></script>
  <script src="components/tunnels.js"></script>
  <script src="components/modals.js"></script>
  <script src="components/keyvault.js"></script>
  <script src="app.js"></script>
</body>
</html>
